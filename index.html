<!doctype html>
<html lang="zh-Hant" data-theme="neobrutalism">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>課堂休息倒數器</title>
    <!-- 載入 Google Fonts: Outfit 與 繁體中文 Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        /* Neobrutalism 亮色主題變數 */
        --bg-gradient: radial-gradient(circle at 18% 18%, rgba(255, 210, 63, 0.4) 0 7%, transparent 7.4%),
                       radial-gradient(circle at 82% 22%, rgba(230, 50, 63, 0.4) 0 6%, transparent 6.4%),
                       radial-gradient(circle at 22% 82%, rgba(47, 89, 255, 0.3) 0 8%, transparent 8.4%),
                       linear-gradient(135deg, #fff9db 0%, #f4fffa 35%, #ffeef0 70%, #e8f9ff 100%);
        --card-bg: rgba(255, 253, 245, 0.95);
        --text-color: #1a1a1a;
        --border-color: #1a1a1a;
        --border-width: 3px;
        --accent: #ffd23f;
        --card-shadow: 8px 8px 0px #1a1a1a;
        --btn-shadow: 4px 4px 0px #1a1a1a;
        --btn-hover-transform: translate(-2px, -2px);
        --btn-active-transform: translate(2px, 2px);
        
        --color-start: #24b36b;
        --color-pause: #ffd23f;
        --color-reset: #e6323f;
        --color-btn-text: #1a1a1a;
        
        --badge-bg: #ff7a1a;
        --badge-text: #ffffff;
        --active-message-color: #e6323f;

        /* 倒數文字醒目顏色 - 粗獷深寶藍 */
        --timer-color: #2f59ff; 
      }

      /* Cyberpunk 暗色主題變數 */
      [data-theme="cyberpunk"] {
        --bg-gradient: radial-gradient(circle at 50% 50%, #150030 0%, #030008 100%);
        --card-bg: rgba(20, 5, 38, 0.85);
        --text-color: #00ffff;
        --border-color: #ff007f;
        --border-width: 2px;
        --accent: #ff007f;
        --card-shadow: 0px 0px 25px rgba(255, 0, 127, 0.5), inset 0 0 15px rgba(0, 255, 255, 0.1);
        --btn-shadow: 0px 0px 10px rgba(0, 255, 255, 0.4);
        --btn-hover-transform: scale(1.03);
        --btn-active-transform: scale(0.97);
        
        --color-start: #39ff14;
        --color-pause: #ff007f;
        --color-reset: #ff0000;
        --color-btn-text: #050010;
        
        --badge-bg: #00ffff;
        --badge-text: #050010;
        --active-message-color: #ffea00;

        /* 倒數文字醒目顏色 - 炙熱霓虹粉 */
        --timer-color: #ff007f; 
      }

      /* Emerald 翡翠微光主題變數 */
      [data-theme="emerald"] {
        --bg-gradient: linear-gradient(135deg, #0b3c2b 0%, #08201d 100%);
        --card-bg: rgba(12, 38, 30, 0.75);
        --text-color: #d1fae5;
        --border-color: #34d399;
        --border-width: 2px;
        --accent: #34d399;
        --card-shadow: 0px 15px 35px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        --btn-shadow: 0 4px 12px rgba(52, 211, 153, 0.2);
        --btn-hover-transform: translateY(-3px);
        --btn-active-transform: translateY(1px);
        
        --color-start: #34d399;
        --color-pause: #f59e0b;
        --color-reset: #ef4444;
        --color-btn-text: #064e3b;
        
        --badge-bg: #10b981;
        --badge-text: #ffffff;
        --active-message-color: #fbbf24;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);

        /* 倒數文字醒目顏色 - 螢光翡翠綠 */
        --timer-color: #00ffaa; 
      }

      /* Sunset 暖陽粉橘主題變數 */
      [data-theme="sunset"] {
        --bg-gradient: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        --card-bg: rgba(255, 255, 255, 0.85);
        --text-color: #2d3748;
        --border-color: #4a5568;
        --border-width: 2px;
        --accent: #f6ad55;
        --card-shadow: 0 12px 28px rgba(0, 0, 0, 0.08), 0 8px 10px rgba(0, 0, 0, 0.06);
        --btn-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        --btn-hover-transform: translateY(-2px);
        --btn-active-transform: translateY(0);
        
        --color-start: #48bb78;
        --color-pause: #f6ad55;
        --color-reset: #fc8181;
        --color-btn-text: #ffffff;
        
        --badge-bg: #ed8936;
        --badge-text: #ffffff;
        --active-message-color: #c2410c;

        /* 倒數文字醒目顏色 - 鮮豔暖夕陽橘 */
        --timer-color: #e53e3e; 
      }

      * {
        box-sizing: border-box;
        transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text-color);
        font-family: "Outfit", "Noto Sans TC", "Microsoft JhengHei", "Segoe UI", sans-serif;
        background: var(--bg-gradient);
        background-attachment: fixed;
      }

      @media (min-width: 993px) {
        body {
          max-height: 100vh;
          overflow: hidden;
        }
      }

      canvas {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }

      .app {
        position: relative;
        z-index: 1;
        max-width: 1350px;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) 380px;
        gap: 16px;
        min-height: 100vh;
        align-items: start;
      }

      @media (min-width: 993px) {
        .app {
          height: 100vh;
          align-items: stretch;
        }
      }

      /* 側邊設定面板與主要內容卡片樣式 */
      .card {
        border: var(--border-width) solid var(--border-color);
        border-radius: 16px;
        background: var(--card-bg);
        box-shadow: var(--card-shadow);
        padding: 18px 24px;
        position: relative;
        overflow: hidden;
      }

      /* Neobrutalism 風格專用裝飾條 */
      [data-theme="neobrutalism"] .card::before {
        content: "";
        display: block;
        height: 6px;
        margin: -18px -24px 14px -24px;
        border-bottom: var(--border-width) solid var(--border-color);
        background: linear-gradient(90deg, #e6323f 0%, #ffd23f 25%, #009b9e 50%, #2f59ff 75%, #ff7a1a 100%);
      }

      /* 主要倒數區域 */
      .stage-card {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      @media (min-width: 993px) {
        .stage-card {
          height: calc(100vh - 32px);
        }
        .panel-card {
          height: calc(100vh - 32px);
          overflow-y: auto;
        }
      }

      /* 頂部 Header & 倒數狀態標題 */
      .header-row {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 12px;
      }

      .course-title {
        min-height: 42px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4px 12px;
        color: var(--text-color);
        font-size: clamp(18px, 2.2vw, 28px);
        font-weight: 950;
        line-height: 1.2;
        text-align: center;
      }

      .badge {
        padding: 4px 14px;
        border: var(--border-width) solid var(--border-color);
        border-radius: 99px;
        background: var(--badge-bg);
        color: var(--badge-text);
        font-weight: 800;
        font-size: 13px;
        box-shadow: var(--btn-shadow);
        text-transform: uppercase;
      }

      @media (max-width: 700px) {
        .header-row {
          grid-template-columns: 1fr;
        }
        .badge {
          justify-self: center;
        }
      }

      /* 經典橫式一條線倒數計時橫幅 */
      .countdown-banner {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        min-height: 100px;
        padding: 14px 20px;
        border: var(--border-width) solid var(--border-color);
        border-radius: 12px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.92)),
          repeating-linear-gradient(90deg, rgba(255, 122, 26, 0.1) 0 24px, rgba(255, 210, 63, 0.1) 24px 48px, rgba(0, 155, 158, 0.1) 48px 72px, rgba(230, 50, 63, 0.1) 72px 96px);
        box-shadow: var(--btn-shadow);
        position: relative;
        overflow: hidden;
      }

      [data-theme="cyberpunk"] .countdown-banner {
        background: rgba(20, 5, 38, 0.85);
      }
      [data-theme="emerald"] .countdown-banner {
        background: rgba(12, 38, 30, 0.6);
      }
      [data-theme="sunset"] .countdown-banner {
        background: linear-gradient(90deg, rgba(251, 194, 235, 0.2), rgba(166, 193, 238, 0.2));
      }

      /* 倒數文字樣式 */
      #message {
        font-size: clamp(26px, 4.2vw, 52px);
        font-weight: 950;
        line-height: 1.1;
        letter-spacing: -1px;
        color: var(--text-color);
        text-transform: uppercase;
        display: inline-block;
      }

      .message-time {
        color: var(--timer-color);
      }

      /* 倒數計時數字的呼吸與動態脈搏效果 */
      .running #message {
        animation: textPulse 1s infinite ease-in-out alternate;
      }

      /* 不同主題下的倒數文字陰影特效 */
      [data-theme="neobrutalism"].running #message .message-time {
        text-shadow: 2px 2px 0px var(--accent);
      }
      [data-theme="cyberpunk"].running #message .message-time {
        text-shadow: 0 0 10px rgba(255, 0, 127, 0.8), 0 0 20px rgba(255, 0, 127, 0.4);
      }
      [data-theme="emerald"].running #message .message-time {
        text-shadow: 0 0 8px rgba(0, 255, 170, 0.6);
      }
      [data-theme="sunset"].running #message .message-time {
        text-shadow: 2px 2px 0px rgba(251, 194, 235, 0.8);
      }

      .sub-message {
        font-size: 15px;
        font-weight: 800;
        opacity: 0.85;
        margin-top: 4px;
        letter-spacing: 0.5px;
      }

      .sub-message.active-message {
        color: var(--active-message-color);
      }

      /* 播放器包裝器 - 填滿 Stage 剩餘高度 */
      .player-wrap {
        position: relative;
        flex-grow: 1;
        border: var(--border-width) solid var(--border-color);
        border-radius: 12px;
        overflow: hidden;
        background: #0d0d0d;
        box-shadow: inset 0 4px 20px rgba(0,0,0,0.6);
        min-height: 0; /* 讓 flex 子元素能在高度受限時縮小 */
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      .empty-player {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #a0aec0;
        text-align: center;
        background: radial-gradient(circle at center, #1a1525 0%, #0d0d0d 100%);
        font-size: clamp(16px, 2vw, 20px);
        font-weight: 700;
        gap: 12px;
      }

      .empty-player svg {
        width: 48px;
        height: 48px;
        fill: currentColor;
        opacity: 0.5;
        animation: pulse 2s infinite ease-in-out;
      }

      /* 側邊欄控制面板 */
      .panel-card {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 900;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-box {
        padding: 8px 12px;
        border: var(--border-width) solid var(--border-color);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
        font-weight: 800;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-indicator {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #718096;
      }

      .status-active {
        background: #48bb78;
        animation: blink 1s infinite alternate;
      }

      .section-title {
        font-size: 13px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
        opacity: 0.9;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        border-top: 1px dashed rgba(128,128,128,0.2);
        padding-top: 10px;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-weight: 700;
        font-size: 13px;
      }

      input, select {
        width: 100%;
        min-height: 36px;
        border: var(--border-width) solid var(--border-color);
        border-radius: 8px;
        padding: 0 10px;
        background: #ffffff;
        color: #1a1a1a;
        font-family: inherit;
        font-size: 13px;
        font-weight: 700;
        outline: none;
      }

      input:focus, select:focus {
        border-color: var(--accent);
      }

      .custom-message-input[hidden] {
        display: none;
      }

      .row-wrap {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px;
        align-items: end;
      }

      /* 自訂雙下拉選單時間選擇器列 */
      .time-picker-row {
        display: grid;
        grid-template-columns: 1fr auto 1fr auto;
        gap: 6px;
        align-items: center;
      }

      .time-select {
        text-align: center;
        padding: 0 8px;
        cursor: pointer;
      }

      .time-separator {
        font-weight: 900;
        font-size: 18px;
        color: var(--text-color);
        padding: 0 2px;
      }

      /* 快速設定按鈕群組 */
      .preset-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 4px;
      }

      .preset-btn {
        min-height: 30px;
        border: 2px solid var(--border-color);
        border-radius: 6px;
        background: rgba(255,255,255,0.06);
        color: var(--text-color);
        font-size: 11px;
        font-weight: 800;
        cursor: pointer;
        padding: 0;
      }

      .preset-btn:hover {
        background: var(--accent);
        color: #1a1a1a;
      }

      /* 主控制按鈕 */
      .action-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      button.action-btn {
        min-height: 38px;
        border: var(--border-width) solid var(--border-color);
        border-radius: 8px;
        color: var(--color-btn-text);
        font-family: inherit;
        font-size: 14px;
        font-weight: 900;
        cursor: pointer;
        box-shadow: var(--btn-shadow);
        transition: transform 0.1s ease, box-shadow 0.1s ease, background-color 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      button.action-btn:hover {
        transform: var(--btn-hover-transform);
        box-shadow: none;
      }

      button.action-btn:active {
        transform: var(--btn-active-transform);
        box-shadow: none;
      }

      .btn-start { background: var(--color-start); }
      .btn-pause { background: var(--color-pause); }
      .btn-resume { background: var(--color-pause); }
      .btn-reset { background: var(--color-reset); color: #ffffff; }
      
      .btn-apply {
        background: var(--accent);
        min-height: 36px;
        padding: 0 12px;
        border: var(--border-width) solid var(--border-color);
        border-radius: 8px;
        font-weight: 800;
        cursor: pointer;
        color: #1a1a1a;
      }

      .btn-load {
        background: var(--accent);
        color: #1a1a1a;
        width: 100%;
        margin-top: 4px;
      }

      /* 主題切換與進階設定 */
      .theme-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
      }

      .theme-btn {
        min-height: 32px;
        border: 2px solid var(--border-color);
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #1a1a1a;
      }
      .t-neo { background: #ffd23f; }
      .t-cyber { background: #ff007f; color: white; }
      .t-eme { background: #34d399; }
      .t-sun { background: #fbc2eb; }

      .theme-btn.active {
        outline: 3px solid #3182ce;
      }

      /* 結束動態特效 */
      .ended .stage-card {
        animation: popPulse 0.4s ease-in-out infinite alternate;
      }

      /* 倒數結束時，統一改為警示紅色與震動效果 */
      .ended #message {
        color: #e6323f !important;
        animation: textShake 0.4s infinite;
        text-shadow: none !important;
      }

      [data-theme="cyberpunk"].ended #message {
        text-shadow: 0 0 10px #e6323f, 0 0 20px #e6323f !important;
      }

      /* 提示音與音效列 */
      .sound-test-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.4; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }

      @keyframes blink {
        from { opacity: 0.4; }
        to { opacity: 1; }
      }

      @keyframes popPulse {
        from { transform: scale(1); }
        to { transform: scale(1.015); }
      }

      @keyframes textPulse {
        from { transform: scale(0.98); }
        to { transform: scale(1.02); }
      }

      @keyframes textShake {
        0% { transform: translate(1px, 1px) rotate(0deg); }
        10% { transform: translate(-1px, -2px) rotate(-1deg); }
        20% { transform: translate(-3px, 0px) rotate(1deg); }
        30% { transform: translate(0px, 2px) rotate(0deg); }
        40% { transform: translate(1px, -1px) rotate(1deg); }
        50% { transform: translate(-1px, 2px) rotate(-1deg); }
        60% { transform: translate(-3px, 1px) rotate(0deg); }
        70% { transform: translate(2px, 1px) rotate(-1deg); }
        80% { transform: translate(-1px, -1px) rotate(1deg); }
        90% { transform: translate(2px, 2px) rotate(0deg); }
        100% { transform: translate(1px, -2px) rotate(-1deg); }
      }

      /* 響應式佈局 */
      @media (max-width: 992px) {
        .app {
          grid-template-columns: 1fr;
          padding: 8px;
        }
        .stage-card {
          min-height: auto;
        }
        .player-wrap {
          height: 340px;
        }
      }
    </style>
  </head>
  <body>
    <!-- 煙火/碎紙屑畫布 -->
    <canvas id="confetti"></canvas>
    
    <main class="app">
      <!-- 左側：倒數計時主要舞台 -->
      <section class="card stage-card" aria-live="polite">
        <header class="header-row">
          <div class="badge" id="themeBadge">亮黃</div>
          <div class="course-title" id="courseTitle"></div>
          <div class="badge" id="timeEndBadge">00:00 上課</div>
        </header>

        <!-- 經典橫式單行倒數計時橫幅 -->
        <div class="countdown-banner">
          <div id="message">距離上課還有 <span class="message-time">10:00</span></div>
          <div id="subMessage" class="sub-message active-message">大家休息一下，喝口水、動一動！</div>
        </div>

        <!-- 播放器區塊 -->
        <div class="player-wrap">
          <div id="youtubePlayer"></div>
          <div id="emptyPlayer" class="empty-player">
            <svg viewBox="0 0 24 24"><path d="M23.498 6.163a3.003 3.003 0 0 0-2.11-2.11C19.518 3.545 12 3.545 12 3.545s-7.518 0-9.388.507a3.003 3.003 0 0 0-2.11 2.11C0 8.033 0 12 0 12s0 3.967.502 5.837a3.003 3.003 0 0 0 2.11 2.11c1.87.507 9.388.507 9.388.507s7.518 0 9.388-.507a3.003 3.003 0 0 0 2.11-2.11C24 15.967 24 12 24 12s0-3.967-.502-5.837zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            <span>請在右側控制台載入影片或播放清單</span>
          </div>
        </div>
      </section>

      <!-- 右側：控制面板 -->
      <aside class="card panel-card">
        <h1>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          休息倒數控制台
        </h1>
        
        <div id="statusBox" class="status-box">
          <div class="status-indicator" id="statusIndicator"></div>
          <span id="statusText">等待開始</span>
        </div>

        <!-- 主題風格切換 -->
        <div class="control-group">
          <div class="section-title">🎨 主題風格切換</div>
          <div class="theme-grid">
            <button class="theme-btn t-neo active" data-theme-id="neobrutalism">亮黃</button>
            <button class="theme-btn t-cyber" data-theme-id="cyberpunk">霓虹</button>
            <button class="theme-btn t-emerald" data-theme-id="emerald">翡翠</button>
            <button class="theme-btn t-sunset" data-theme-id="sunset">暖陽</button>
          </div>
        </div>

            <input id="endMessageInput" class="custom-message-input" type="text" value="" placeholder="請輸入倒數結束顯示文字" hidden />

        <!-- YouTube 影片設定 -->

            <input id="playlistInput" type="url" placeholder="貼上 YouTube 網址或影片 ID" value="https://www.youtube.com/watch?v=4aizyAaIRrA&amp;list=PLFeHIx8c8FmAoYBz2MOYcujqJm-ha-iTE&amp;index=21" />

    <!-- 載入 YouTube API (用於倒數開始/暫停時控制影片播放) -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
      // 綁定 DOM 元素
      const minutesInput = document.querySelector("#minutesInput");
      const applyBtn = document.querySelector("#applyBtn");
      const targetHourSelect = document.querySelector("#targetHourSelect");
      const targetMinuteSelect = document.querySelector("#targetMinuteSelect");
      const targetTimeBtn = document.querySelector("#targetTimeBtn");
      const startBtn = document.querySelector("#startBtn");
      const pauseBtn = document.querySelector("#pauseBtn");
      const resumeBtn = document.querySelector("#resumeBtn");
      const resetBtn = document.querySelector("#resetBtn");
      const playlistInput = document.querySelector("#playlistInput");
      const loadPlaylistBtn = document.querySelector("#loadPlaylistBtn");
      const soundSelect = document.querySelector("#soundSelect");
      const testSoundBtn = document.querySelector("#testSoundBtn");
      
      const message = document.querySelector("#message");
      const subMessage = document.querySelector("#subMessage");
      const courseTitle = document.querySelector("#courseTitle");
      const courseSelect = document.querySelector("#courseSelect");
      const activeMessageSelect = document.querySelector("#activeMessageSelect");
      const activeMessageInput = document.querySelector("#activeMessageInput");
      const endMessageSelect = document.querySelector("#endMessageSelect");
      const endMessageInput = document.querySelector("#endMessageInput");
      
      const statusText = document.querySelector("#statusText");
      const statusIndicator = document.querySelector("#statusIndicator");
      const emptyPlayer = document.querySelector("#emptyPlayer");
      const timeEndBadge = document.querySelector("#timeEndBadge");
      const themeBadge = document.querySelector("#themeBadge");
      const canvas = document.querySelector("#confetti");
      const ctx = canvas.getContext("2d");

      // 計時器變數
      let duration = 10 * 60; // 預設 10 分鐘
      let remaining = duration;
      let timerId = null;
      let isRunning = false;
      let endTime = null;
      let targetLabel = "";
      let pinnedClassTime = "";
      
      // YouTube API 播放器變數
      let ytPlayer = null;
      let ytPlayerReady = false;
      
      // 煙火特效變數
      let confettiId = null;
      let confettiPieces = [];
      let alarmRepeatId = null;

      // 初始化下拉時間選單、時間徽章
      initTargetTimeSelectors();
      updateEndBadge();

      // 建立 Hour/Minute 雙下拉選單 (風格與輸入框一致)
      function initTargetTimeSelectors() {
        // 時 00-23
        targetHourSelect.innerHTML = "";
        for (let h = 0; h < 24; h++) {
          const opt = document.createElement("option");
          opt.value = pad(h);
          opt.textContent = pad(h) + " 時";
          targetHourSelect.appendChild(opt);
        }
        
        // 分 00-59
        targetMinuteSelect.innerHTML = "";
        for (let m = 0; m < 60; m++) {
          const opt = document.createElement("option");
          opt.value = pad(m);
          opt.textContent = pad(m) + " 分";
          targetMinuteSelect.appendChild(opt);
        }
        
        // 預設選取目前時間
        const now = new Date();
        targetHourSelect.value = pad(now.getHours());
        targetMinuteSelect.value = pad(now.getMinutes());
      }

      function resizeCanvas() {
        canvas.width = window.innerWidth * window.devicePixelRatio;
        canvas.height = window.innerHeight * window.devicePixelRatio;
        ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
      }

      function pad(value) {
        return String(value).padStart(2, "0");
      }

      function stripCourseNumber(text) {
        return text.replace(/^\d+\./, "");
      }

      function updateCourseTitle() {
        courseTitle.textContent = stripCourseNumber(courseSelect.value);
      }

      function syncCustomMessageInput(selectEl, inputEl) {
        const isCustom = selectEl.value === "custom";
        inputEl.hidden = !isCustom;
        if (isCustom) {
          inputEl.focus();
        }
      }

      function getSelectedMessage(selectEl, inputEl, fallback) {
        if (selectEl.value === "custom") {
          return inputEl.value.trim() || fallback;
        }
        return selectEl.value || fallback;
      }

      function getActiveMessage() {
        return getSelectedMessage(activeMessageSelect, activeMessageInput, "大家休息一下，喝口水、動一動！");
      }

      function getEndMessage() {
        return getSelectedMessage(endMessageSelect, endMessageInput, "上課囉! 趕快回到位子上面~");
      }

      // 更新上課時間徽章
      function updateEndBadge() {
        if (pinnedClassTime) {
          timeEndBadge.textContent = `${pinnedClassTime} 上課`;
          return;
        }

        const now = new Date();
        const end = new Date(now.getTime() + remaining * 1000);
        timeEndBadge.textContent = `${pad(end.getHours())}:${pad(end.getMinutes())} 上課`;
      }

      // 渲染計時器文字與狀態
      function render() {
        const minutes = Math.floor(remaining / 60);
        const seconds = remaining % 60;
        
        if (remaining === 0) {
          message.textContent = "時間到！";
          subMessage.classList.remove("active-message");
          subMessage.textContent = getEndMessage();
          statusText.textContent = "倒數結束";
          statusIndicator.className = "status-indicator";
        } else {
          message.innerHTML = `距離上課還有 <span class="message-time">${pad(minutes)}:${pad(seconds)}</span>`;
          subMessage.classList.add("active-message");
          subMessage.textContent = getActiveMessage();
          if (isRunning) {
            statusText.textContent = targetLabel ? `倒數中 (目標 ${targetLabel})` : "倒數計時中";
            statusIndicator.className = "status-indicator status-active";
          } else {
            statusText.textContent = "待機中 / 已暫停";
            statusIndicator.className = "status-indicator";
          }
        }
      }

      // 手動套用分鐘
      function readDuration() {
        const minutes = Math.max(1, Math.min(180, Number.parseInt(minutesInput.value, 10) || 10));
        minutesInput.value = minutes;
        duration = minutes * 60;
        remaining = duration;
        
        resetTimerState();
        render();
        updateEndBadge();
      }

      // 套用目標時間 (改為讀取 Hour/Minute 選單)
      function applyTargetTime() {
        const hourVal = targetHourSelect.value;
        const minuteVal = targetMinuteSelect.value;
        
        const now = new Date();
        const target = new Date(now);
        target.setHours(Number(hourVal), Number(minuteVal), 0, 0);
        if (target <= now) {
          target.setDate(target.getDate() + 1); // 跨天
        }

        duration = Math.max(1, Math.round((target - now) / 1000));
        remaining = duration;
        targetLabel = `${hourVal}:${minuteVal}`;
        pinnedClassTime = targetLabel;
        
        resetTimerState();
        render();
        updateEndBadge();
      }

      // 重設計時器狀態
      function resetTimerState() {
        clearInterval(timerId);
        timerId = null;
        isRunning = false;
        document.body.classList.remove("ended", "running");
        pauseBtn.style.display = "inline-flex";
        resumeBtn.style.display = "none";
        stopAlarmRepeat();
        stopConfetti();
        
        // 停止影片
        controlVideo("stop");
      }

      // 精準倒數 tick 方法
      function tick() {
        if (!isRunning) return;
        
        const now = Date.now();
        remaining = Math.max(0, Math.round((endTime - now) / 1000));
        
        render();
        
        if (remaining === 0) {
          clearInterval(timerId);
          timerId = null;
          isRunning = false;
          document.body.classList.add("ended");
          document.body.classList.remove("running");
          statusIndicator.className = "status-indicator";
          
          // 停止影片並重複播放鐘聲
          controlVideo("stop");
          startAlarmRepeat(soundSelect.value);
          startConfetti();
        }
      }

      // 開始倒數
      function startTimer() {
        if (isRunning) return;
        
        if (remaining <= 0) {
          remaining = duration;
          document.body.classList.remove("ended");
          stopAlarmRepeat();
          stopConfetti();
        }
        
        // 用目前時間加上剩餘時間，做精準校正
        endTime = Date.now() + remaining * 1000;
        isRunning = true;
        document.body.classList.add("running");
        
        pauseBtn.style.display = "inline-flex";
        resumeBtn.style.display = "none";
        
        tick();
        timerId = setInterval(tick, 200);
        updateEndBadge();
        
        // 自動播放影片
        controlVideo("play");
      }

      // 暫停倒數
      function pauseTimer() {
        if (!isRunning) return;
        isRunning = false;
        clearInterval(timerId);
        timerId = null;
        document.body.classList.remove("running");
        
        pauseBtn.style.display = "none";
        resumeBtn.style.display = "inline-flex";
        render();
        
        // 自動暫停影片
        controlVideo("pause");
      }

      // 重設計時器
      function resetTimer() {
        resetTimerState();
        remaining = duration;
        render();
        updateEndBadge();
        controlVideo("stop");
      }

      // --- YouTube Iframe Player API 控制影片邏輯 ---
      window.onYouTubeIframeAPIReady = function() {
        loadPlaylist();
      };

      // 控制影片播放/暫停/停止
      function controlVideo(action) {
        if (ytPlayerReady && ytPlayer && typeof ytPlayer.playVideo === "function") {
          try {
            if (action === "play") {
              ytPlayer.playVideo();
            } else if (action === "pause") {
              ytPlayer.pauseVideo();
            } else if (action === "stop") {
              ytPlayer.stopVideo();
            }
            return;
          } catch (e) {
            console.warn("YouTube API call failed: ", e);
          }
        }
        
        // 備用方案：如果 API 未準備妥當，嘗試手動重載 iframe 來停止聲音
        const iframe = document.querySelector("#youtubePlayer");
        if (iframe && action === "stop") {
          const src = iframe.src;
          iframe.src = "";
          iframe.src = src; 
        }
      }

      // YouTube 輸入解析
      function parseYouTubeInput(value) {
        const input = value.trim();
        if (!input) return { listId: "", videoId: "" };
        
        if (/^[a-zA-Z0-9_-]{10,}$/.test(input) && !input.includes("http")) {
          if (input.startsWith("PL")) return { listId: input, videoId: "" };
          return { listId: "", videoId: input };
        }
        
        try {
          const url = new URL(input);
          const listId = url.searchParams.get("list") || "";
          let videoId = url.searchParams.get("v") || "";
          
          if (!videoId && url.pathname.includes("/embed/")) {
            videoId = url.pathname.split("/embed/")[1]?.split("/")[0] || "";
          }
          if (!videoId && url.hostname.includes("youtu.be")) {
            videoId = url.pathname.replace("/", "");
          }
          return { listId, videoId };
        } catch (error) {
          return { listId: "", videoId: "" };
        }
      }

      function buildEmbedUrl({ listId, videoId }) {
        const params = new URLSearchParams({ 
          rel: "0", 
          autoplay: "0", 
          playsinline: "1", 
          enablejsapi: "1" 
        });
        
        if (listId) {
          params.set("listType", "playlist");
          params.set("list", listId);
        }
        
        if (videoId) {
          return `https://www.youtube.com/embed/${encodeURIComponent(videoId)}?${params.toString()}`;
        }
        if (listId) {
          return `https://www.youtube.com/embed/videoseries?${params.toString()}`;
        }
        return "";
      }

      // 載入影片播放器 (建立並初始化 YT Player 實體)
      function loadPlaylist() {
        const parsed = parseYouTubeInput(playlistInput.value);
        if (!parsed.listId && !parsed.videoId) {
          statusText.textContent = "無法解析該連結，請輸入正確的 YouTube 網址";
          return;
        }

        emptyPlayer.style.display = "none";
        ytPlayerReady = false;

        // 如果已存在舊的 Player，則先將其銷毀
        if (ytPlayer) {
          try {
            ytPlayer.destroy();
          } catch (e) {
            console.warn(e);
          }
          ytPlayer = null;
        }

        // 清空容器並建立 placeholder div
        const playerWrap = document.querySelector(".player-wrap");
        playerWrap.innerHTML = '<div id="youtubePlayer"></div>';

        const playerVars = {
          rel: 0,
          autoplay: isRunning ? 1 : 0,
          playsinline: 1,
          enablejsapi: 1
        };

        if (parsed.listId) {
          playerVars.listType = "playlist";
          playerVars.list = parsed.listId;
        }

        try {
          ytPlayer = new YT.Player('youtubePlayer', {
            height: '100%',
            width: '100%',
            videoId: parsed.videoId || undefined,
            playerVars: playerVars,
            events: {
              'onReady': () => {
                ytPlayerReady = true;
                statusText.textContent = parsed.listId ? "影片播放清單已載入" : "單一影片已載入";
                if (isRunning) {
                  ytPlayer.playVideo();
                }
              },
              'onError': (e) => {
                console.error("YT Player Error:", e.data);
                fallbackStandardIframe(parsed);
              }
            }
          });
        } catch (e) {
          console.warn("YouTube API init failed, using fallback:", e);
          fallbackStandardIframe(parsed);
        }
      }

      function fallbackStandardIframe(parsed) {
        const playerWrap = document.querySelector(".player-wrap");
        const embedUrl = buildEmbedUrl(parsed);
        playerWrap.innerHTML = `<iframe id="youtubePlayer" src="${embedUrl}" title="YouTube 播放器" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>`;
      }

      // --- Web Audio API 敲擊鐘聲與西敏寺鐘聲合成 (超高音量 + 動態壓縮防止破音版本) ---
      function getAlarmRepeatDelay(type) {
        if (type === "westminster") return 8500;
        if (type === "classic_bell") return 2800;
        if (type === "chime") return 2200;
        if (type === "beep") return 1400;
        return 0;
      }

      function startAlarmRepeat(type) {
        stopAlarmRepeat();
        if (type === "none") return;

        playAlarmSound(type);
        const delay = getAlarmRepeatDelay(type);
        if (delay > 0) {
          alarmRepeatId = setInterval(() => {
            playAlarmSound(type);
          }, delay);
        }
      }

      function stopAlarmRepeat() {
        if (alarmRepeatId) {
          clearInterval(alarmRepeatId);
          alarmRepeatId = null;
        }
      }

      function playAlarmSound(type) {
        try {
          if (type === "none") return;
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const audioCtx = new AudioContext();
          const now = audioCtx.currentTime;

          // 1. 建立動態壓縮器 (DynamicsCompressorNode)：防止多個發聲器疊加導致爆音/破音
          const compressor = audioCtx.createDynamicsCompressor();
          compressor.threshold.setValueAtTime(-12, now); // 低於 -12dB 開始壓縮
          compressor.knee.setValueAtTime(30, now);
          compressor.ratio.setValueAtTime(12, now);      // 強力壓縮比例
          compressor.attack.setValueAtTime(0.003, now);  // 快速響應
          compressor.release.setValueAtTime(0.25, now);  // 快速釋放

          // 2. 建立 3 倍增益放大器 (GainNode)：配合壓縮器，顯著提升人耳聽覺的「響度」與「音量」達 3 倍。
          const boostGain = audioCtx.createGain();
          boostGain.gain.setValueAtTime(3.0, now);

          // 連接至喇叭：[音源] -> compressor -> boostGain -> 喇叭
          compressor.connect(boostGain);
          boostGain.connect(audioCtx.destination);

          if (type === "westminster") {
            // 台灣學校西敏寺鐘聲 (Mi-Do-Re-Sol, Sol-Re-Mi-Do) 
            const melody = [
              { f: 659.25, d: 0.75 }, // Mi (E5)
              { f: 523.25, d: 0.75 }, // Do (C5)
              { f: 587.33, d: 0.75 }, // Re (D5)
              { f: 392.00, d: 1.2 },  // Sol (G4)
              { f: 392.00, d: 0.75 }, // Sol (G4)
              { f: 587.33, d: 0.75 }, // Re (D5)
              { f: 659.25, d: 0.75 }, // Mi (E5)
              { f: 523.25, d: 1.5 }   // Do (C5)
            ];

            let time = now;
            melody.forEach((note) => {
              // 基音 (將正弦波改成三角波 triangle，諧波更豐富，聽覺音量顯著提升，更有銅鐘的紮實感)
              const osc1 = audioCtx.createOscillator();
              const gain1 = audioCtx.createGain();
              osc1.type = "triangle";
              osc1.frequency.setValueAtTime(note.f, time);
              
              // 泛音 1 (1倍高八度，增加清脆金屬聲)
              const osc2 = audioCtx.createOscillator();
              const gain2 = audioCtx.createGain();
              osc2.type = "sine";
              osc2.frequency.setValueAtTime(note.f * 2, time);
              
              // 泛音 2 (1.5倍五度音，提供實體銅鐘共鳴的不諧和感)
              const osc3 = audioCtx.createOscillator();
              const gain3 = audioCtx.createGain();
              osc3.type = "sine";
              osc3.frequency.setValueAtTime(note.f * 3, time);

              // 聲音包絡線設定 (模擬實體銅鐘敲擊：0.01 秒極快打擊 -> 漫長共鳴衰減)
              gain1.gain.setValueAtTime(0, time);
              gain1.gain.linearRampToValueAtTime(0.9, time + 0.015);
              gain1.gain.exponentialRampToValueAtTime(0.001, time + note.d);

              gain2.gain.setValueAtTime(0, time);
              gain2.gain.linearRampToValueAtTime(0.4, time + 0.01);
              gain2.gain.exponentialRampToValueAtTime(0.001, time + note.d * 0.7);

              gain3.gain.setValueAtTime(0, time);
              gain3.gain.linearRampToValueAtTime(0.2, time + 0.01);
              gain3.gain.exponentialRampToValueAtTime(0.001, time + note.d * 0.5);

              // 全部連線至壓縮器 (防止疊加爆音)
              osc1.connect(gain1); gain1.connect(compressor);
              osc2.connect(gain2); gain2.connect(compressor);
              osc3.connect(gain3); gain3.connect(compressor);

              osc1.start(time);
              osc2.start(time);
              osc3.start(time);

              osc1.stop(time + note.d + 0.1);
              osc2.stop(time + note.d + 0.1);
              osc3.stop(time + note.d + 0.1);

              time += 0.88; 
            });
          } else if (type === "classic_bell") {
            // 傳統敲擊鐘聲 (鐺鐺鐺鐺... 快速敲擊 12 次)
            const count = 12;
            const interval = 0.18;
            for (let i = 0; i < count; i++) {
              const time = now + i * interval;
              const osc = audioCtx.createOscillator();
              const gainNode = audioCtx.createGain();
              
              osc.type = "triangle";
              osc.frequency.setValueAtTime(580, time);
              
              gainNode.gain.setValueAtTime(0, time);
              gainNode.gain.linearRampToValueAtTime(0.9, time + 0.005);
              gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
              
              osc.connect(gainNode);
              gainNode.connect(compressor);
              
              osc.start(time);
              osc.stop(time + 0.3);
            }
          } else if (type === "chime") {
            // 優雅水晶和弦
            const chord = [523.25, 659.25, 783.99, 1046.50];
            chord.forEach((freq, index) => {
              const time = now + index * 0.12;
              const osc = audioCtx.createOscillator();
              const gainNode = audioCtx.createGain();
              osc.type = "sine";
              osc.frequency.setValueAtTime(freq, time);
              
              gainNode.gain.setValueAtTime(0.9, time);
              gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.8);
              
              osc.connect(gainNode);
              gainNode.connect(compressor);
              osc.start(time);
              osc.stop(time + 1.0);
            });
          } else if (type === "beep") {
            // 電子嗶嗶聲
            [0, 0.25, 0.5].forEach((delay) => {
              const time = now + delay;
              const osc = audioCtx.createOscillator();
              const gainNode = audioCtx.createGain();
              osc.type = "triangle";
              osc.frequency.setValueAtTime(880, time);
              
              gainNode.gain.setValueAtTime(0.8, time);
              gainNode.gain.setValueAtTime(0.001, time + 0.15);
              
              osc.connect(gainNode);
              gainNode.connect(compressor);
              osc.start(time);
              osc.stop(time + 0.2);
            });
          }

          const closeDelay = getAlarmRepeatDelay(type) || 1200;
          window.setTimeout(() => {
            audioCtx.close().catch(() => {});
          }, closeDelay + 500);
        } catch (e) {
          console.error("無法播放音效: ", e);
        }
      }

      // 測試音效按鈕
      testSoundBtn.addEventListener("click", () => {
        stopAlarmRepeat();
        playAlarmSound(soundSelect.value);
      });

      // 快速時間 Preset 按鈕
      document.querySelectorAll(".preset-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          minutesInput.value = btn.dataset.preset;
          readDuration();
        });
      });

      // 主題切換
      document.querySelectorAll(".theme-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".theme-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          
          const themeId = btn.dataset.themeId;
          document.documentElement.setAttribute("data-theme", themeId);
          themeBadge.textContent = btn.textContent;
        });
      });

      // --- Confetti 煙火特效 ---
      function makePiece() {
        const colors = ["#e6323f", "#009b9e", "#ffd23f", "#ff7a1a", "#2f59ff", "#24b36b", "#8a3ffc"];
        return {
          x: Math.random() * window.innerWidth,
          y: -30 - Math.random() * 120,
          size: 8 + Math.random() * 12,
          speed: 2 + Math.random() * 4,
          drift: -1.5 + Math.random() * 3.0,
          rotation: Math.random() * Math.PI,
          spin: -0.15 + Math.random() * 0.3,
          color: colors[Math.floor(Math.random() * colors.length)]
        };
      }

      function startConfetti() {
        if (confettiId) return;
        resizeCanvas();
        confettiPieces = Array.from({ length: 150 }, makePiece);
        animateConfetti();
      }

      function stopConfetti() {
        if (confettiId) {
          cancelAnimationFrame(confettiId);
          confettiId = null;
        }
        confettiPieces = [];
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }

      function animateConfetti() {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        confettiPieces.forEach((piece, index) => {
          piece.x += piece.drift;
          piece.y += piece.speed;
          piece.rotation += piece.spin;
          
          if (piece.y > window.innerHeight + 40) {
            confettiPieces[index] = makePiece();
          }
          
          ctx.save();
          ctx.translate(piece.x, piece.y);
          ctx.rotate(piece.rotation);
          ctx.fillStyle = piece.color;
          ctx.fillRect(-piece.size / 2, -piece.size / 3, piece.size, piece.size * 0.66);
          ctx.restore();
        });
        confettiId = requestAnimationFrame(animateConfetti);
      }

      window.addEventListener("resize", () => {
        resizeCanvas();
      });
      
      applyBtn.addEventListener("click", readDuration);
      targetTimeBtn.addEventListener("click", applyTargetTime);
      startBtn.addEventListener("click", startTimer);
      pauseBtn.addEventListener("click", pauseTimer);
      resumeBtn.addEventListener("click", startTimer);
      resetBtn.addEventListener("click", resetTimer);
      loadPlaylistBtn.addEventListener("click", loadPlaylist);

      courseSelect.addEventListener("change", updateCourseTitle);
      activeMessageSelect.addEventListener("change", () => {
        syncCustomMessageInput(activeMessageSelect, activeMessageInput);
        render();
      });
      activeMessageInput.addEventListener("input", render);
      endMessageSelect.addEventListener("change", () => {
        syncCustomMessageInput(endMessageSelect, endMessageInput);
        render();
      });
      endMessageInput.addEventListener("input", render);

      // 初始化頁面渲染由 API ready 控制，在此做基本渲染
      updateCourseTitle();
      syncCustomMessageInput(activeMessageSelect, activeMessageInput);
      syncCustomMessageInput(endMessageSelect, endMessageInput);
      render();
    </script>
  </body>
</html>
