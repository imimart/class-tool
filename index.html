<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>課堂休息時間倒數計時器</title>
    <style>
      :root {
        --ink: #171717;
        --paper: #fff7df;
        --red: #e6323f;
        --teal: #009b9e;
        --yellow: #ffd23f;
        --orange: #ff7a1a;
        --blue: #2f59ff;
        --green: #24b36b;
        --purple: #8a3ffc;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: auto;
        color: var(--ink);
        font-family: "Microsoft JhengHei", "Segoe UI", sans-serif;
        letter-spacing: 0;
        background:
          radial-gradient(circle at 18% 18%, rgba(255, 210, 63, 0.92) 0 7%, transparent 7.4%),
          radial-gradient(circle at 82% 22%, rgba(230, 50, 63, 0.92) 0 6%, transparent 6.4%),
          radial-gradient(circle at 22% 82%, rgba(47, 89, 255, 0.85) 0 8%, transparent 8.4%),
          linear-gradient(135deg, #fff2b0 0 18%, #f7fffb 18% 36%, #ffd7dc 36% 56%, #d9f8ff 56% 75%, #fff2b0 75%);
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        opacity: 0;
      }

      body::after {
        opacity: 0;
      }

      canvas {
        position: fixed;
        inset: 0;
        z-index: 4;
        pointer-events: none;
      }

      .app {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 330px;
        gap: 18px;
        padding: 14px;
      }

      .stage,
      .panel {
        border: 2px solid rgba(23, 23, 23, 0.28);
        border-radius: 8px;
        background: rgba(255, 247, 223, 0.96);
        box-shadow: none;
      }

      .stage {
        position: relative;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: calc(100vh - 36px);
        padding: 16px;
      }

      .stage::before,
      .panel::before {
        content: "";
        display: block;
        height: 10px;
        margin-bottom: 10px;
        border: 2px solid rgba(23, 23, 23, 0.65);
        background:
          linear-gradient(135deg, var(--red) 0 25%, transparent 25% 50%, var(--teal) 50% 75%, transparent 75%) 0 0 / 46px 16px repeat-x,
          var(--yellow);
      }

      .countdown-banner {
        display: grid;
        gap: 8px;
        align-content: center;
        min-height: 82px;
        margin-bottom: 12px;
        padding: 12px 16px;
        border: 2px solid rgba(23, 23, 23, 0.45);
        border-radius: 8px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.92)),
          repeating-linear-gradient(90deg, var(--orange) 0 24px, var(--yellow) 24px 48px, var(--teal) 48px 72px, var(--red) 72px 96px);
      }

      .badge {
        width: fit-content;
        padding: 6px 12px;
        border: 3px solid var(--ink);
        border-radius: 999px;
        background: var(--yellow);
        box-shadow: 4px 4px 0 var(--ink);
        font-weight: 900;
        font-size: 14px;
      }

      #message {
        font-size: clamp(28px, 4vw, 56px);
        font-weight: 950;
        line-height: 1;
        text-shadow: 3px 3px 0 rgba(255, 210, 63, 0.75);
      }

      .player-wrap {
        position: relative;
        min-height: 360px;
        border: 2px solid rgba(23, 23, 23, 0.5);
        border-radius: 8px;
        overflow: auto;
        background: #111;
        box-shadow: inset 0 0 0 10px rgba(255, 210, 63, 0.08);
      }

      iframe {
        width: 100%;
        height: 100%;
        min-height: calc(100vh - 185px);
        border: 0;
        display: block;
        background: #111;
      }

      .empty-player {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 14px;
        color: white;
        text-align: center;
        background:
          radial-gradient(circle at 30% 30%, rgba(255, 210, 63, 0.25), transparent 24%),
          radial-gradient(circle at 70% 65%, rgba(230, 50, 63, 0.25), transparent 22%),
          #111;
        font-size: clamp(22px, 3vw, 40px);
        font-weight: 950;
      }

      .panel {
        align-self: start;
        padding: 14px;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 26px;
        line-height: 1;
      }

      .section {
        display: grid;
        gap: 12px;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 2px solid rgba(23, 23, 23, 0.75);
      }

      label {
        display: grid;
        gap: 7px;
        font-weight: 900;
      }

      input {
        width: 100%;
        min-height: 42px;
        border: 2px solid rgba(23, 23, 23, 0.75);
        border-radius: 8px;
        padding: 0 13px;
        background: white;
        color: var(--ink);
        font: inherit;
        font-size: 14px;
        font-weight: 800;
      }

      .time-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
      }

      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      button {
        min-height: 42px;
        border: 2px solid rgba(23, 23, 23, 0.75);
        border-radius: 8px;
        color: var(--ink);
        font: inherit;
        font-size: 15px;
        font-weight: 950;
        cursor: pointer;
        box-shadow: none;
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }

      button:hover {
        transform: translate(2px, 2px);
        box-shadow: none;
      }

      button:active {
        transform: translate(1px, 1px);
        box-shadow: none;
      }

      .start { background: var(--green); }
      .pause { background: var(--yellow); }
      .reset { background: var(--red); color: white; }
      .load { background: var(--blue); color: white; }
      .wide { grid-column: 1 / -1; }

      .status {
        padding: 12px;
        border: 2px solid rgba(23, 23, 23, 0.6);
        border-radius: 8px;
        background: white;
        font-weight: 900;
      }

      .ended .stage {
        animation: popPulse 0.8s ease-in-out infinite alternate;
      }

      .ended #message {
        color: var(--red);
      }

      @media (max-width: 980px) {
        body { overflow: auto; }
        .app {
          grid-template-columns: 1fr;
        }
        .stage {
          min-height: auto;
        }
        iframe {
          min-height: 360px;
        }
      }

      @media (max-width: 560px) {
        .app { padding: 16px; }
        .buttons,
        .time-row { grid-template-columns: 1fr; }
      }

      @keyframes popPulse {
        from { transform: rotate(-0.35deg) scale(1); }
        to { transform: rotate(0.35deg) scale(1.01); }
      }
    </style>
  </head>
  <body>
    <canvas id="confetti"></canvas>
    <main class="app">
      <section class="stage" aria-live="polite">
        <div class="countdown-banner">
          <div id="message">距離上課還有 10:00</div>
        </div>

        <div class="player-wrap">
          <iframe id="youtubePlayer" title="YouTube 播放清單播放器" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
          <div id="emptyPlayer" class="empty-player">請在右側貼上 YouTube 播放清單連結</div>
        </div>
      </section>

      <aside class="panel">
        <h1>休息倒數控制台</h1>
        <div id="status" class="status">尚未開始</div>

        <section class="section">
          <label>
            倒數時間設定(分)
            <div class="time-row">
              <input id="minutesInput" type="number" min="1" max="180" step="1" value="10" />
              <button id="applyBtn" class="pause" type="button">套用</button>
            </div>
          </label>

          <label>
            目標時間設定
            <div class="time-row">
              <input id="targetTimeInput" type="time" value="23:00" />
              <button id="targetTimeBtn" class="pause" type="button">套用</button>
            </div>
          </label>

          <div class="buttons">
            <button id="startBtn" class="start" type="button">開始</button>
            <button id="pauseBtn" class="pause" type="button">暫停</button>
            <button id="resumeBtn" class="pause" type="button">繼續</button>
            <button id="resetBtn" class="reset" type="button">重設</button>
          </div>
        </section>

        <section class="section">
          <label>
            YouTube 播放清單貼入連結設定
            <input id="playlistInput" type="url" placeholder="貼上播放清單網址或 playlist ID" value="https://www.youtube.com/watch?v=4aizyAaIRrA&amp;list=PLFeHIx8c8FmAoYBz2MOYcujqJm-ha-iTE&amp;index=21" />
          </label>
          <button id="loadPlaylistBtn" class="load" type="button">載入播放清單</button>
        </section>
      </aside>
    </main>

    <script>
      const minutesInput = document.querySelector("#minutesInput");
      const applyBtn = document.querySelector("#applyBtn");
      const targetTimeInput = document.querySelector("#targetTimeInput");
      const targetTimeBtn = document.querySelector("#targetTimeBtn");
      const startBtn = document.querySelector("#startBtn");
      const pauseBtn = document.querySelector("#pauseBtn");
      const resumeBtn = document.querySelector("#resumeBtn");
      const resetBtn = document.querySelector("#resetBtn");
      const playlistInput = document.querySelector("#playlistInput");
      const loadPlaylistBtn = document.querySelector("#loadPlaylistBtn");
      const message = document.querySelector("#message");
      const statusText = document.querySelector("#status");
      const player = document.querySelector("#youtubePlayer");
      const emptyPlayer = document.querySelector("#emptyPlayer");
      const canvas = document.querySelector("#confetti");
      const ctx = canvas.getContext("2d");

      let duration = 10 * 60;
      let remaining = duration;
      let timerId = null;
      let isRunning = false;
      let confettiId = null;
      let confettiPieces = [];
      let targetLabel = "";

      function resizeCanvas() {
        canvas.width = window.innerWidth * window.devicePixelRatio;
        canvas.height = window.innerHeight * window.devicePixelRatio;
        ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
      }

      function pad(value) {
        return String(value).padStart(2, "0");
      }

      function render() {
        const minutes = Math.floor(remaining / 60);
        const seconds = remaining % 60;
        message.textContent = remaining === 0 ? "上課囉! 趕快回到位子上面~" : `距離上課還有 ${pad(minutes)}:${pad(seconds)}`;
        statusText.textContent = remaining === 0 ? "倒數結束" : targetLabel ? `${targetLabel}，${isRunning ? "倒數中" : "已暫停 / 待機"}` : isRunning ? "倒數中" : "已暫停 / 待機";
      }

      function readDuration() {
        const minutes = Math.max(1, Math.min(180, Number.parseInt(minutesInput.value, 10) || 10));
        minutesInput.value = minutes;
        duration = minutes * 60;
        remaining = duration;
        targetLabel = "";
        stopTimer();
        stopConfetti();
        document.body.classList.remove("ended");
        render();
      }

      
      function applyTargetTime() {
        const value = targetTimeInput.value;
        if (!value) {
          statusText.textContent = "請先選擇目標時間";
          return;
        }

        const [hours, minutes] = value.split(":").map(Number);
        const now = new Date();
        const target = new Date(now);
        target.setHours(hours, minutes, 0, 0);
        if (target <= now) {
          target.setDate(target.getDate() + 1);
        }

        duration = Math.max(1, Math.round((target - now) / 1000));
        remaining = duration;
        targetLabel = `目標 ${value}`;
        stopTimer();
        stopConfetti();
        document.body.classList.remove("ended");
        render();
      }
      function stopTimer() {
        clearInterval(timerId);
        timerId = null;
        isRunning = false;
      }

      function startTimer() {
        if (remaining <= 0) {
          remaining = duration;
          stopConfetti();
          document.body.classList.remove("ended");
        }
        if (timerId) return;
        isRunning = true;
        render();
        timerId = setInterval(() => {
          remaining = Math.max(0, remaining - 1);
          render();
          if (remaining === 0) {
            stopTimer();
            document.body.classList.add("ended");
            startConfetti();
            render();
          }
        }, 1000);
      }

      function pauseTimer() {
        if (!timerId) return;
        stopTimer();
        render();
      }

      function resetTimer() {
        stopTimer();
        remaining = duration;
        stopConfetti();
        document.body.classList.remove("ended");
        render();
      }

      function parseYouTubeInput(value) {
        const input = value.trim();
        if (!input) return { listId: "", videoId: "" };
        if (/^[a-zA-Z0-9_-]{10,}$/.test(input) && !input.includes("http")) {
          return { listId: input, videoId: "" };
        }
        try {
          const url = new URL(input);
          const listId = url.searchParams.get("list") || "";
          let videoId = url.searchParams.get("v") || "";
          if (!videoId && url.pathname.includes("/embed/")) {
            videoId = url.pathname.split("/embed/")[1]?.split("/")[0] || "";
          }
          if (!videoId && url.hostname.includes("youtu.be")) {
            videoId = url.pathname.replace("/", "");
          }
          return { listId, videoId };
        } catch (error) {
          return { listId: "", videoId: "" };
        }
      }

      function buildEmbedUrl({ listId, videoId }) {
        const params = new URLSearchParams({ rel: "0", autoplay: "0", playsinline: "1" });
        if (listId) params.set("list", listId);
        if (videoId) return `https://www.youtube.com/embed/${encodeURIComponent(videoId)}?${params.toString()}`;
        return `https://www.youtube.com/embed/videoseries?${params.toString()}`;
      }

      function loadPlaylist() {
        const parsed = parseYouTubeInput(playlistInput.value);
        if (!parsed.listId && !parsed.videoId) {
          statusText.textContent = "找不到播放清單或影片 ID，請確認連結包含 list= 或 v=";
          return;
        }
        player.src = buildEmbedUrl(parsed);
        emptyPlayer.style.display = "none";
        statusText.textContent = parsed.listId ? "播放清單已載入" : "影片已載入";
      }

      function makePiece() {
        const colors = ["#e6323f", "#009b9e", "#ffd23f", "#ff7a1a", "#2f59ff", "#24b36b", "#8a3ffc"];
        return {
          x: Math.random() * window.innerWidth,
          y: -30 - Math.random() * 120,
          size: 8 + Math.random() * 12,
          speed: 2 + Math.random() * 4,
          drift: -1.6 + Math.random() * 3.2,
          rotation: Math.random() * Math.PI,
          spin: -0.18 + Math.random() * 0.36,
          color: colors[Math.floor(Math.random() * colors.length)]
        };
      }

      function startConfetti() {
        if (confettiId) return;
        confettiPieces = Array.from({ length: 150 }, makePiece);
        animateConfetti();
      }

      function stopConfetti() {
        cancelAnimationFrame(confettiId);
        confettiId = null;
        confettiPieces = [];
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }

      function animateConfetti() {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        confettiPieces.forEach((piece, index) => {
          piece.x += piece.drift;
          piece.y += piece.speed;
          piece.rotation += piece.spin;
          if (piece.y > window.innerHeight + 40) confettiPieces[index] = makePiece();
          ctx.save();
          ctx.translate(piece.x, piece.y);
          ctx.rotate(piece.rotation);
          ctx.fillStyle = piece.color;
          ctx.fillRect(-piece.size / 2, -piece.size / 3, piece.size, piece.size * 0.66);
          ctx.restore();
        });
        confettiId = requestAnimationFrame(animateConfetti);
      }

      window.addEventListener("resize", resizeCanvas);
      applyBtn.addEventListener("click", readDuration);
      targetTimeBtn.addEventListener("click", applyTargetTime);
      startBtn.addEventListener("click", startTimer);
      pauseBtn.addEventListener("click", pauseTimer);
      resumeBtn.addEventListener("click", startTimer);
      resetBtn.addEventListener("click", resetTimer);
      loadPlaylistBtn.addEventListener("click", loadPlaylist);

      resizeCanvas();
      render();
      loadPlaylist();
    </script>
  </body>
</html>
